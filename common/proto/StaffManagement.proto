syntax = "proto3";

import "Common.proto";

// Each one of these must be accessible by the front end
service StaffManagement {
    
    // Staff Movement
    rpc AddStaff(StaffDTO)               returns (Success);
    rpc RemoveStaff(StaffDTO)            returns (Success);
    
    // Staff Information Updates
    rpc ChangePosition(StaffDTO)         returns (Success);
    rpc ChangeClearance(StaffDTO)        returns (Success);
    rpc UpdateStaffInformation(StaffDTO) returns (Success);
    
    // Staff Scheduling
    rpc AddShift(StaffShift)             returns (Success);
    rpc RemoveShift(StaffShift)          returns (Success);
    rpc TransferShift(StaffShift)        returns (Success);
    rpc BookTimeOff(TimeOff)             returns (Success);
    
    // Staff Information
    rpc SeeStaffInformation(StaffDTO)    returns (StaffDTO);
    rpc SeeTodaysSchedule(StaffDTO)      returns (StaffSchedule);
    rpc SeeTomorrowsSchedule(StaffDTO)   returns (StaffSchedule);
    rpc SeeScheduleRange(StaffShift)     returns (StaffSchedule);
    
    /* This call is not accessible to the front end */
    rpc GetStaffInRoom(RoomRequest)      returns (StaffList);
}

message StaffDTO {
    NameDTO staff_name   = 1;
    uint64  staff_id     = 2;
    string  staff_sex    = 3;
    uint32  staff_room   = 4;
    float   staff_salary = 5;
    string  staff_pos    = 6;
    string  staff_clear  = 7;
}

message StaffShift {
    StaffDTO staff = 1;
    ShiftDTO shift = 2;
}

message TimeOff {
    StaffDTO staff     = 1;
    DateDTO start_date = 2;
    DateDTO end_date   = 3;
}

message StaffSchedule {
    repeated StaffShift shifts = 1;
}

message StaffList {
    repeated StaffDTO staff = 1;
}
