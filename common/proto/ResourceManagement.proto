syntax = "proto3";

import "Common.proto";

// Each one of these must be accessible by the front end
service ResourceManagement {
    
    // Machine Resource Movement
    rpc RegisterResource(ResourceDTO)       returns (Success);
    rpc DeregisterResource(ResourceDTO)     returns (Success);
    rpc SendForMaintenance(ResourceDTO)     returns (Success);
    
    // Machine Resource Scheduling
    rpc AddToSchedule(ResourceShift)        returns (Success);
    rpc RemoveFromSchedule(ResourceShift)   returns (Success);
    rpc RemoveResourceFromRoom(ResourceDTO) returns (Success);
    rpc ChangeSchedule(ResourceShift)       returns (Success);
    
    // Schedule viewing
    rpc SeeTodaysSchedule(ResourceDTO)      returns (ResourceSchedule);
    rpc SeeTomorrowsSchedule(ResourceDTO)   returns (ResourceSchedule);
    rpc SeeScheduleRange(ResourceShift)     returns (ResourceSchedule);
    
    // Consumable Resource Updates
    rpc AddStock(StockUpdate)               returns (Success);
    rpc RemoveStock(StockUpdate)            returns (Success);
    rpc UseStock(StockUpdate)               returns (Success);
    rpc EmptyStock(StockUpdate)             returns (Success);
    
    // Resource Information
    rpc GetResourceInformation(ResourceDTO) returns (ResourceDTO);
    
    /* This call is not accessible to the front end */
    rpc GetResourcesInRoom(RoomRequest)     returns (ResourceList);
}

message ResourceDTO {
    uint64 resource_id    = 1;
    uint32 room_id        = 2;
    string resource_type  = 3;
    uint32 resource_stock = 4;
}

message ResourceShift {
    ResourceDTO resource = 1;
    DateDTO     start    = 2;
    DateDTO     other    = 3;
    uint64      duration = 4;
}

message StockUpdate {
    uint64 resource_id   = 1;
    string resource_type = 2;
    uint32 stock_amount  = 3;
}

message ResourceList {
    repeated ResourceDTO resources = 1;
}

message ResourceSchedule {
    repeated ResourceShift dates = 1;
}
