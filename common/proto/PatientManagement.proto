syntax = "proto3";

import "Common.proto";

// Each one of these must be accessible by the front end
service PatientManagement {
    
    // Patient movement
    rpc AdmitPatient(PatientDTO)                 returns (Success);
    rpc DischargePatient(PatientDTO)             returns (Success);
    rpc TransferPatient(PatientTransfer)         returns (Success);
    rpc QuarantinePatient(PatientQuarantine)     returns (Success);
    rpc LiftPatientQuarantine(PatientQuarantine) returns (Success);
    
    // Patient information
    rpc GetPatientInformation(PatientDTO)        returns (PatientDTO);
    rpc UpdatePatientInformation(PatientDTO)     returns (Success);
    
    /* This call is not accessible to the front end */
    rpc GetPatientsInRoom(RoomRequest)           returns (PatientList);
}

message PatientDTO { // Basic Patient DTO
    NameDTO patient_name   = 1;
    uint64  patient_id     = 2;
    string  patient_sex    = 3;
    string  patient_cond   = 4;
    uint32  patient_room   = 5;
    string  room_type      = 6;
    bool    is_quarantined = 7;
}

message PatientTransfer { // Transfer patient to a new room
    uint64 patient_id     = 1;
    uint32 old_room_id    = 2;
    uint32 new_room_id    = 3;
    string room_type      = 4;
    bool   is_quarantined = 5;
}

message PatientQuarantine { // Quarantine a patient
    uint64 patient_id      = 1;
    bool   quarantine_room = 2;
    /*
    Quarantine patient:
     True -> Quarantine all other patients in the room
     False -> Move all other patients to non-quarantined rooms
     
    Lift Quarantine:
     True -> Lift quarantine on entire room
     False -> move this patient to a non-quarantined room
     */
}

message PatientList {
    repeated PatientDTO patients = 1;
}

