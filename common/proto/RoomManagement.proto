syntax = "proto3";

import "Common.proto";
import "PatientManagement.proto";
import "ResourceManagement.proto";
import "StaffManagement.proto";

service RoomManagement {
    /* These calls will not be accessible to the front end */
    
    // Patient Management Requests
    rpc AdmitPatient(PatientDTO)                 returns (Success);
    rpc DischargePatient(PatientDTO)             returns (Success);
    rpc TransferPatient(PatientTransfer)         returns (Success);
    rpc QuarantinePatient(PatientQuarantine)     returns (Success);
    rpc LiftPatientQuarantine(PatientQuarantine) returns (Success);
    
    // Resource Management Requests
    rpc RetrieveResource(ResourceDTO)            returns (Success);
    rpc ReleaseResource(ResourceDTO)             returns (Success);
    rpc TransferResource(ResourceDTO)            returns (Success);
    
    // Staff Management Requests
    rpc RetrieveStaff(StaffDTO)                  returns (Success);
    rpc ReleaseStaff(StaffDTO)                   returns (Success);
    rpc TransferStaff(StaffDTO)                  returns (Success);
    
    /* These calls need to be accessable to the front end */
    
    // Front End Requests
    rpc QuarantineRoom(RoomQuarantine)           returns (Success);
    rpc GetRoomInformation(RoomDTO)              returns (RoomInformation); // Displays all the people and resources in a room
}

message RoomDTO {
    string          room_type         = 1;
    uint32          room_id           = 2;
    uint32          room_capacity     = 3;
    uint32          current_capacity  = 4;
    bool            quarantined       = 5;
    repeated uint64 assigned_staff    = 6;
    repeated uint64 assigned_patients = 7;
    repeated uint64 assigned_resource = 8;
}

message RoomQuarantine {
    uint32 room_id    = 1;
    bool quarantine   = 2;
    bool move_patient = 3;
}

message RoomInformation {
    RoomDTO      room_information     = 1;
    PatientList  patient_information  = 2;
    ResourceList resource_information = 3;
    StaffList    staff_information    = 4;
}
