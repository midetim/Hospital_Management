syntax = "proto3";

import "common.proto";

service RoomManagement {
    // Patient related
    rpc AdmitPatient(RoomAdmissionRequest) returns (RoomSuccess);
    rpc DischargePatient(RoomDischargeRequest) returns (RoomSuccess);
    rpc TransferPatient(RoomTransferRequest) returns (RoomSuccess);
    rpc QuarantinePatient(Nothing) returns (RoomSuccess); // TODO: Figure out what message to send l8r
    
    // Room related
    rpc GetAvailableRoom(RoomAvailabilityRequest) returns (AvailableRoom);
    rpc QuarantineRoom(RoomQuarantineRequest) returns (RoomSuccess);
    rpc LiftQuarantine(RoomQuarantineRequest) returns (RoomSuccess);
    rpc GetRoomInformation(RoomInfoRequest) returns (RoomInformation);

    // Resource related
    rpc GetResource(ResourceInfo) returns (RoomSuccess);
    rpc ReleaseResource(ResourceInfo) returns (RoomSuccess);
    rpc TransferResource(ResourceInfo) returns (RoomSuccess);
    
    // Staff related
    
    
    // Globals
    rpc Print(Nothing) returns (Nothing);
    rpc RoomPing(RoomPingRequest) returns (RoomSuccess);
}

/* Rooms are -> <room_id, Room> (here) */
/* Patients are -> <patient_id, room_id> (in patient mngment) */

message RoomPingRequest {
    bool ping = 1;
}

/*
    Will send a patient id and a room type to the service.
    service will automatically put patient in a room that matches the type
    Will not put normal patients in quarantined rooms, and quarantined patients
    into non-quarantined rooms
 */
message RoomAdmissionRequest {
    uint64 patient_id = 1; // Only sends patient id
    string room_type = 2; // defaults to general
    bool quarantined = 3; // defaults to not
}

message RoomDischargeRequest {
    uint64 patient_id = 1; // Patient to discharge
    uint32 room_id = 2; // Room patient is in
}

message RoomTransferRequest {
    uint64 patient_id = 1;
    uint32 old_room_id = 2;
    string room_type = 3;
    uint32 room_id = 4;
    bool to_quarantine = 5;
    /* For transfer req, if room_id is empty it will automatically assign room
     Otherwise, first do an availibilty req to get room id
     May have some common room ids later though*/
}

message RoomSuccess {
    bool success = 1;
    uint32 room_id = 2; // Related room
}

message RoomAvailabilityRequest {
    string room_type = 1; // Type of room you are looking for availability for
    bool quarantined = 2;
}

message AvailableRoom {
    bool success = 1; // False if a room could not be found
    uint32 room_id = 2; // Room id of the available room
}

// May need to rethink later
message RoomQuarantineRequest {
    uint32 room_id = 1;
    bool quarantine_patients = 2;
}

message RoomInfoRequest {
    uint32 room_id = 1;
}

message RoomInformation {
    string room_type = 1;
    uint32 room_id = 2;
    uint32 max_capacity = 3;
    uint32 current_capacity = 4;
    repeated uint32 assigned_staff = 5;
    repeated uint32 assigned_patients = 6;
    bool quarantined = 7;
}

message ResourceInfo {
    uint64 resource_id = 1;
    uint32 room_id = 2;
}
